<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Bulanan</title>
<style>
body{
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    padding:30px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th, td{
    border:1px solid #333;
    padding:14px;
    text-align:left;
}
th{
    background:#C00000;
}
</style>
</head>
<body>

<h1>Laporan Bulanan</h1>

<table>
    <tr>
        <th>Bulan</th>
        <th>Total Service</th>
        <th>Pendapatan</th>
        <th>Status</th>
    </tr>

    <tr>
        <td>Mei 2026</td>
        <td>45</td>
        <td>Rp 8.500.000</td>
        <td>Selesai</td>
    </tr>

    <tr>
        <td>April 2026</td>
        <td>39</td>
        <td>Rp 7.200.000</td>
        <td>Selesai</td>
    </tr>
</table>

</body>
</html>
